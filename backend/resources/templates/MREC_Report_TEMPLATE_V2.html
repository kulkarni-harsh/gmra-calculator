<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">MERC Clinical Demand Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy:    #0d1f3c;
  --blue:    #1a5fa8;
  --sky:     #2d9cdb;
  --ice:     #e8f2fb;
  --light:   #f4f7fb;
  --border:  #dce8f4;
  --text:    #1a2535;
  --muted:   #6b82a0;
  --white:   #ffffff;
  --green:   #1a7a4a;
  --green-bg:#e8f5ee;
  --amber:   #b85c00;
  --amber-bg:#fff3e0;
  --red:     #9b1c1c;
  --red-bg:  #fef2f2;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: #d0dae8;
  color: var(--text);
  padding: 40px 20px;
  min-height: 100vh;
}

.page {
  width: 900px;
  margin: 0 auto;
  background: var(--white);
  box-shadow: 0 24px 80px rgba(13,31,60,0.18);
  position: relative;
}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
.header {
  background: var(--navy);
  padding: 0;
  position: relative;
  overflow: hidden;
}

.header::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 320px; height: 100%;
  background: linear-gradient(135deg, transparent 40%, rgba(45,156,219,0.08) 100%);
  pointer-events: none;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 40px 20px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* MERC wordmark inline */
.merc-wordmark {
  display: flex;
  flex-direction: column;
  gap: 0px;
}

.merc-line1 {
  display: flex;
  align-items: baseline;
  line-height: 1;
}

.merc-line2 {
  display: flex;
  align-items: baseline;
  line-height: 1;
  margin-top: -3px;
}

.w-medical, .w-estate {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 3px;
  color: #ffffff;
}

.w-real {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 3px;
  color: var(--sky);
  margin-left: 10px;
}

.w-calculator {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 3px;
  color: var(--sky);
  margin-left: 10px;
  padding-bottom: 4px;
  align-self: flex-end;
  opacity: 0.85;
}

.tm {
  font-family: 'Montserrat', sans-serif;
  font-size: 9px;
  font-weight: 600;
  vertical-align: super;
  color: var(--sky);
}

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.globe-logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  filter: brightness(1.05);
}

.report-badge {
  background: linear-gradient(135deg, var(--sky), var(--blue));
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  padding: 4px 12px;
  border-radius: 2px;
}

.header-band {
  background: linear-gradient(90deg, var(--blue) 0%, #1a4a78 50%, var(--navy) 100%);
  padding: 10px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.catch-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.9);
}

.catch-text em {
  font-style: normal;
  color: var(--sky);
}

.header-meta {
  font-family: 'Montserrat', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
}

/* ══════════════════════════════════
   REPORT ID STRIP
══════════════════════════════════ */
.report-id-strip {
  background: var(--light);
  border-bottom: 2px solid var(--border);
  padding: 12px 40px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
}

.rid-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-right: 20px;
  border-right: 1px solid var(--border);
}

.rid-item:last-child { border-right: none; }

.rid-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.rid-value {
  font-size: 12px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: 0.5px;
}

.rid-value.highlight { color: var(--blue); }

/* ══════════════════════════════════
   REPORT TITLE SECTION
══════════════════════════════════ */
.report-title-section {
  padding: 32px 40px 24px 40px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.title-left {
  flex: 1;
}

.tier-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--ice);
  border: 1px solid var(--sky);
  border-radius: 2px;
  padding: 4px 12px;
  margin-bottom: 10px;
}

.tier-pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--sky);
}

.tier-pill-text {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--blue);
}

.report-main-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px;
  letter-spacing: 2px;
  color: var(--navy);
  line-height: 1.05;
  margin-bottom: 6px;
}

.report-subtitle {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.3px;
}

.verdict-box {
  min-width: 180px;
  padding: 16px 20px;
  border-radius: 3px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.verdict-box.opportunity {
  background: var(--green-bg);
  border: 2px solid var(--green);
}

.verdict-box.caution {
  background: var(--amber-bg);
  border: 2px solid var(--amber);
}

.verdict-box.avoid {
  background: var(--red-bg);
  border: 2px solid var(--red);
}

.verdict-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.verdict-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
  line-height: 1;
}

.verdict-box.opportunity .verdict-value { color: var(--green); }
.verdict-box.caution .verdict-value { color: var(--amber); }
.verdict-box.avoid .verdict-value { color: var(--red); }

.verdict-sub {
  font-size: 9px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ══════════════════════════════════
   BODY CONTENT
══════════════════════════════════ */
.body-content {
  padding: 0 40px 32px 40px;
}

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 0 12px 0;
  border-bottom: 2px solid var(--navy);
  margin-bottom: 16px;
}

.section-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--sky);
  line-height: 1;
  min-width: 28px;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--navy);
}

.section-title em {
  font-style: normal;
  color: var(--blue);
}

/* Metric cards row */
.metric-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.metric-row.three-col { grid-template-columns: repeat(3, 1fr); }

.metric-card {
  background: var(--light);
  border: 1px solid var(--border);
  border-top: 3px solid var(--blue);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.metric-card.accent { border-top-color: var(--sky); }
.metric-card.strong { border-top-color: var(--navy); }

.metric-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.metric-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--navy);
  line-height: 1;
  letter-spacing: 1px;
}

.metric-value.blue { color: var(--blue); }
.metric-value.sky { color: var(--sky); }
.metric-value.green { color: var(--green); }
.metric-value.red { color: var(--red); }

.metric-sub {
  font-size: 9px;
  color: var(--muted);
  font-weight: 500;
}

/* Data table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
  font-size: 11px;
}

.data-table thead tr {
  background: var(--navy);
}

.data-table thead th {
  padding: 9px 12px;
  text-align: left;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
}

.data-table thead th:first-child {
  padding-left: 16px;
}

.data-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.data-table tbody tr:nth-child(even) {
  background: var(--light);
}

.data-table tbody td {
  padding: 9px 12px;
  color: var(--text);
  font-weight: 500;
}

.data-table tbody td:first-child {
  padding-left: 16px;
  font-weight: 700;
  color: var(--navy);
  font-family: 'Montserrat', monospace;
  font-size: 10px;
  letter-spacing: 1px;
}

.data-table tfoot tr {
  background: var(--ice);
  border-top: 2px solid var(--blue);
}

.data-table tfoot td {
  padding: 10px 12px;
  font-weight: 800;
  font-size: 11px;
  color: var(--navy);
}

.data-table tfoot td:first-child {
  padding-left: 16px;
}

/* CPT comparison */
.section-note {
  background: var(--light);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  padding: 10px 12px;
  margin-bottom: 14px;
  font-size: 10px;
  line-height: 1.5;
  color: var(--muted);
}

.section-note strong {
  color: var(--navy);
}

.know-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--navy);
  margin-bottom: 8px;
}

.know-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.know-card {
  background: var(--light);
  border: 1px solid var(--border);
  border-top: 3px solid var(--navy);
  padding: 10px 12px;
}

.know-card-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}

.know-card-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 1px;
  line-height: 1;
  color: var(--navy);
}

.know-card-value.up { color: var(--green); }
.know-card-value.down { color: var(--red); }
.know-card-value.neutral { color: var(--blue); }

.know-card-sub {
  margin-top: 4px;
  font-size: 9px;
  color: var(--muted);
  line-height: 1.4;
}

.comparison-table {
  font-size: 10px;
}

.comparison-table thead th {
  font-size: 7px;
}

/* right-align headers for all numeric columns to match data cell alignment */
.comparison-table thead th:nth-child(n+2) {
  text-align: right;
}

.comparison-table td:nth-child(3),
.comparison-table td:nth-child(4),
.comparison-table td:nth-child(5),
.comparison-table td:nth-child(6),
.comparison-table td:nth-child(7),
.comparison-table td:nth-child(8),
.comparison-table td:nth-child(9) {
  text-align: right;
}

/* right-align Medicare Rate td (col 2) */
.comparison-table td:nth-child(2) {
  text-align: right;
}

.comparison-table td.client-col {
  color: var(--blue);
  font-weight: 700;
}

.comparison-table td.delta-pos {
  color: var(--green);
  font-weight: 700;
}

.comparison-table td.delta-neg {
  color: var(--red);
  font-weight: 700;
}

.comparison-table td.medicare-rate-col {
  color: var(--muted);
  font-style: italic;
}

.comparison-footnote {
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 14px;
}


/* Provider density position strip */
.density-compare {
  background: var(--light);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  padding: 12px 16px;
  margin-bottom: 20px;
}

.density-compare-title {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.density-bar-wrap {
  position: relative;
  height: 10px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 10px;
}

.density-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--navy), var(--blue));
}

.density-bar-fill.saturated {
  background: linear-gradient(90deg, var(--red), #c53030);
}

.density-bar-marker {
  position: absolute;
  top: -4px;
  width: 2px;
  height: calc(100% + 8px);
  background: var(--sky);
  border-radius: 1px;
}

.density-bar-marker::after {
  content: attr(data-label);
  position: absolute;
  top: -13px;
  left: 5px;
  font-size: 8px;
  font-weight: 700;
  color: var(--sky);
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.density-legend {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-weight: 600;
  color: var(--muted);
}

.density-legend .dl-hi { color: var(--navy); font-weight: 700; }
.density-legend .dl-gap-pos { color: var(--green); font-weight: 700; }
.density-legend .dl-gap-neg { color: var(--red); font-weight: 700; }

/* Capacity gauge */
.capacity-section {
  background: var(--light);
  border: 1px solid var(--border);
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.gauge-wrap {
  position: relative;
  width: 130px;
  height: 70px;
  flex-shrink: 0;
}

.gauge-svg {
  width: 130px;
  height: 70px;
}

.gauge-label {
  position: absolute;
  bottom: -20%; left: 50%;
  transform: translateX(-50%);
  text-align: center;
}

.gauge-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--navy);
  letter-spacing: 1px;
  line-height: 1;
}

.gauge-sub {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.capacity-detail {
  flex: 1;
}

.capacity-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--navy);
  margin-bottom: 8px;
}

.capacity-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.cap-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cap-item-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.cap-item-val {
  font-size: 14px;
  font-weight: 800;
  color: var(--navy);
}

.cap-item-val.blue  { color: var(--blue); }
.cap-item-val.sky   { color: var(--sky); }
.cap-item-val.green { color: var(--green); }
.cap-item-val.red   { color: var(--red); }
.cap-item-val.muted { color: var(--muted); }

/* Analysis narrative */
.analysis-box {
  background: var(--navy);
  color: white;
  padding: 20px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.analysis-box::before {
  content: '"';
  position: absolute;
  top: -10px; left: 16px;
  font-size: 120px;
  color: rgba(45,156,219,0.12);
  font-family: 'Source Serif 4', serif;
  line-height: 1;
  pointer-events: none;
}

.analysis-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sky);
  margin-bottom: 8px;
}

.analysis-text {
  font-family: 'Source Serif 4', serif;
  font-size: 12.5px;
  font-weight: 300;
  line-height: 1.7;
  color: rgba(255,255,255,0.88);
}

.analysis-text strong {
  font-weight: 600;
  color: white;
}

/* Upgrade section */
.upgrade-section {
  background: var(--ice);
  border: 1px solid var(--sky);
  border-left: 4px solid var(--sky);
  padding: 16px 20px;
  margin-bottom: 20px;
}

/* Methodology appendix */
.appendix {
  border-top: 2px solid var(--border);
  padding: 12px 40px 12px 40px;
  background: var(--light);
}

.appendix-title {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* each block is full-width so chips spread across the whole line */
.appendix-block {
  margin-bottom: 8px;
}

.appendix-block:last-child { margin-bottom: 0; }

.appendix-block-label {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--navy);
  margin-bottom: 4px;
}

.appendix-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.appendix-chip {
  font-family: 'Courier New', monospace;
  font-size: 8px;
  padding: 2px 6px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text);
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.upgrade-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--navy);
  margin-bottom: 10px;
}

.upgrade-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.upgrade-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.upgrade-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--blue);
  line-height: 1;
  min-width: 48px;
}

.upgrade-detail {
  flex: 1;
}

.upgrade-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 2px;
}

.upgrade-desc {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

/* ══════════════════════════════════
   FOOTER
══════════════════════════════════ */
.footer {
  background: var(--navy);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 3px solid var(--blue);
}

.footer-left {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.footer-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: white;
}

.footer-legal {
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.35);
  max-width: 420px;
  line-height: 1.5;
}

.footer-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.footer-codes {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--sky);
}

.footer-codes span {
  color: rgba(255,255,255,0.25);
  margin: 0 4px;
}

.footer-page {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0 16px 0;
}

/* Tag */
.tag {
  display: inline-block;
  background: var(--ice);
  border: 1px solid var(--blue);
  color: var(--blue);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 1px;
  margin-right: 4px;
}

.tag.green {
  background: var(--green-bg);
  border-color: var(--green);

    const cleaned = String(v).replace(/[^0-9.-]/g, '');
    if (!cleaned || cleaned === '-' || cleaned === '.' || cleaned === '-.') return NaN;

  const sumNums = (arr) => arr.reduce((acc, n) => acc + (Number.isFinite(n) ? n : 0), 0);

        <div class="metric-value green">${D.targetDensity}</div>
        <div class="metric-sub">State physician density (2023), per 100k</div>
      </div>
    </div>

    <!-- SECTION 02 -->
    <div class="section-header">
      <div class="section-num">02</div>
      <div class="section-title">"Through the Door" <em>Practice Positioning vs Peers</em></div>
    </div>

    <div class="section-note">
      <strong>Comparison logic:</strong> ${subjectLabel} is compared against the
      <strong>average single peer provider</strong>, not against the sum of all peer providers.
      Peer averages are normalized using ${competitorCount} peer provider${competitorCount === 1 ? '' : 's'} inside ${D.radius}.
    </div>

    <div class="know-title">Practice Position Snapshot</div>
    <div class="know-grid">${knowCardsHtml}</div>

    <table class="data-table comparison-table">
      <thead>
        <tr>
          <th>CPT</th>
          <th title="CMS 2026 Physician Fee Schedule — office-setting rate, state-adjusted">Medicare Approved Rate</th>
          <th>Market Volume</th><th>${shortLabel} Vol. / Yr</th><th>% Mkt Share</th><th>Peer Avg Volume</th><th>% vs Peer Avg</th>
        </tr>
      </thead>
      <tbody>${cptScoreRowsHtml}</tbody>
      <tfoot>
        <tr>
          <td>Total (CPT Basket)</td>
          <td>—</td>
          <td>${fmtInt(marketVisitsTotal)}</td>
          <td class="client-col">${Number.isFinite(clientVisits) ? fmtInt(clientVisits) : '—'}</td>
          <td>${fmtShare(clientVisitSharePct)}</td>
          <td>${fmtInt(peerAvgVisitsFromRows)}</td>
          <td class="${Number.isFinite(clientVsPeerVolPct) ? (clientVsPeerVolPct >= 0 ? 'delta-pos' : 'delta-neg') : ''}">${fmtDelta(clientVsPeerVolPct)}</td>
        </tr>
      </tfoot>
    </table>
    <div class="comparison-footnote">
      Where client CPT data is unavailable, the practice column shows "N/A" while market and peer averages remain visible.
      <em>Medicare Rate</em> = CMS 2026 Physician Fee Schedule — office-setting rate, state-adjusted.
    </div>

    <!-- SECTION 03 -->
    <div class="section-header">
      <div class="section-num">03</div>
      <div class="section-title">Utilisation &amp; <em>Market Pool Analysis</em></div>
    </div>

    <div class="section-note">
      <strong>Interpretation:</strong> how much of the available procedure market is ${subjectLabel} capturing, and where are the volume gaps?
      Upside comes from share capture and closing the CPT mix gap to peer-average volume.
    </div>

    <div class="capacity-section">
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 130 70">
          <path d="M 15 65 A 50 50 0 0 1 115 65" stroke="#dce8f4" stroke-width="10" fill="none" stroke-linecap="round"/>
          <path d="M 15 65 A 50 50 0 0 1 115 65" stroke="url(#gaugeGrad)" stroke-width="10" fill="none" stroke-linecap="round"
                stroke-dasharray="157" stroke-dashoffset="${gaugeDash}"/>
          <defs>
            <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#0d1f3c"/>
              <stop offset="100%" style="stop-color:#2d9cdb"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="gauge-label">
          <div class="gauge-pct">${fmtShare(clientVisitSharePct)}</div>
          <div class="gauge-sub">CPT Market Share</div>
        </div>
      </div>
      <div class="capacity-detail">
        <div class="capacity-title">Volume Capture: Share &amp; CPT Mix Gap Analysis</div>
        <div class="capacity-grid">
          <div class="cap-item">
            <div class="cap-item-label">Market Procedure Pool (CPT Basket)</div>
            <div class="cap-item-val blue">${fmtInt(marketVisitsTotal)} visits / yr</div>
          </div>
          <div class="cap-item">
            <div class="cap-item-label">${subjectLabel} Visit Volume</div>
            <div class="cap-item-val">${Number.isFinite(clientVisits) ? fmtInt(clientVisits) + ' visits / yr' : '—'}</div>
          </div>
          <div class="cap-item">
            <div class="cap-item-label">${subjectLabel} Market Share</div>
            <div class="cap-item-val ${Number.isFinite(clientVisitSharePct) ? (clientVisitSharePct >= fairSharePct ? 'green' : 'sky') : ''}">${fmtShare(clientVisitSharePct)}</div>
          </div>
          <div class="cap-item">
            <div class="cap-item-label">Avg Peer Visit Volume</div>
            <div class="cap-item-val blue">${fmtInt(peerAvgVisitsFromRows)} visits / yr</div>
          </div>
          <div class="cap-item">
            <div class="cap-item-label">Volume Gap to Peer Avg</div>
            <div class="cap-item-val ${Number.isFinite(volGapToPeer) ? (volGapToPeer > 0 ? 'red' : 'green') : ''}">${Number.isFinite(volGapToPeer) ? (volGapToPeer > 0 ? '+' : '') + fmtInt(volGapToPeer) + ' visits' : '—'}</div>
          </div>
          <div class="cap-item">
            <div class="cap-item-label">Top Under-Indexed CPT Codes</div>
            <div class="cap-item-val blue">${topUnderIndexedCodes || '—'}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- SECTION 04 -->
    <div class="section-header">
      <div class="section-num">04</div>
      <div class="section-title">Action <em>Summary</em></div>
    </div>

    <div class="analysis-box">
      <div class="analysis-label">What This Means for ${subjectLabel}</div>
      <div class="analysis-text">${D.analysisText}</div>
    </div>

    <!-- SECTION 05: UPGRADES -->
    <div class="upgrade-section">
      <div class="upgrade-title">Recommended Next-Step Reports</div>
      <div class="upgrade-grid">${upgradesHtml}</div>
    </div>

  </div><!-- /body-content -->

  <!-- APPENDIX: DATA COVERAGE & METHODOLOGY -->
  <div class="appendix">
    <div class="appendix-title">Data Coverage &amp; Methodology</div>
    <div class="appendix-block">
      <div class="appendix-block-label">ZIP Codes Searched — ${(D.searchedZipCodes || []).length} ZIP codes within ${D.radius}</div>
      <div class="appendix-chips">${zipChipsHtml || '<span style="font-size:9px;color:var(--muted)">—</span>'}</div>
    </div>
    <div class="appendix-block">
      <div class="appendix-block-label">Specialty Taxonomy Codes — NPI Registry (${(D.taxonomyCodes || []).length} codes)</div>
      <div class="appendix-chips">${taxChipsHtml || '<span style="font-size:9px;color:var(--muted)">—</span>'}</div>
    </div>
    ${(D.sourceTabs || []).length > 0 ? `
    <div class="appendix-block">
      <div class="appendix-block-label">Physician Density Source — US Physician Workforce Data Dashboard, 2023 Physician Density by State &amp; Specialty</div>
      <div class="appendix-chips">${sourceTabsHtml}</div>
    </div>` : ''}
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-left">
      <div class="footer-brand">MCREC Reports LLC &nbsp;·&nbsp; Powered by Medical Real Estate Calculator™</div>
      <div class="footer-legal">
        Report prepared exclusively for named recipient. AlphaSophia data utilized under applicable license terms — end customer is direct licensee.
        MCREC Reports LLC acts solely as commercial facilitator. This report does not constitute legal, financial, or investment advice.
        © 2026 MCREC Reports LLC. All rights reserved.
      </div>
    </div>
    <div class="footer-right">
      <div class="footer-codes">CPT<span>·</span>DRG<span>·</span>ICD-10</div>
      <div class="footer-page">Page 1 of 1 &nbsp;·&nbsp; Report ${D.reportId}</div>
    </div>
  </div>

  `;

  // Update page title
  document.getElementById('page-title').textContent =
    `MERC Report ${D.reportId} — ${D.market} ${D.specialty}`;

})();
</script>

</body>
</html>
